hubble_tension:
  aliases: ["H0 tension", "Hubble constant tension"]
  definition: "Discrepancy between early-universe and late-universe measurements of H0."
  key_parameters: ["H0", "Omega_m", "S8"]
  key_observables: ["Type Ia supernovae", "CMB anisotropy", "BAO", "strong-lens time delays", "standard sirens"]
  related_topics: ["dark_energy_evolution", "early_dark_energy", "distance_ladder_calibration"]

s8_tension:
  aliases: ["sigma8 tension", "weak lensing tension", "structure growth tension"]
  definition: "Mild discrepancy in clustering amplitude constraints from CMB versus low-redshift structure probes."
  key_parameters: ["S8", "sigma8", "Omega_m"]
  key_observables: ["cosmic shear", "CMB lensing", "galaxy clustering", "cluster counts"]
  related_topics: ["hubble_tension", "modified_gravity", "mass_calibration_systematics"]

dark_energy_evolution:
  aliases: ["dynamical dark energy", "w0wa", "time-varying equation of state"]
