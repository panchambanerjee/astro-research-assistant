  key_parameters: ["w0", "wa", "Omega_m", "H0"]
  key_observables: ["BAO", "Type Ia supernovae", "cosmic chronometers", "weak lensing", "RSD"]
  related_topics: ["hubble_tension", "late_time_acceleration", "distance_redshift_relation"]

