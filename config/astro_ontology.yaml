profile_overlays:
  s8_weak_lensing:
    description: Weak-lensing / CMB clustering-amplitude tension profile.
    applies_to_domains:
      - cosmology
    match:
      any:
        - s8
        - s_8
        - sigma8 tension
        - cosmic shear
        - weak lensing
      boost_if:
        - planck
        - kids
        - des
        - hsc
    canonical_queries:
      - '"S8 tension" "weak lensing"'
      - '"S_8" "cosmic shear" Planck'
      - '"sigma8 tension" KiDS DES HSC Planck'
      - '"cosmic shear" "Planck" "S8"'
    observables:
      - cosmic shear
      - weak gravitational lensing
      - weak lensing two-point functions
      - galaxy clustering
      - CMB lensing
      - CMB anisotropies
    surveys:
      - Planck
      - DES
      - KiDS
      - HSC
      - ACT
      - SPT
    parameters:
      - S8
      - sigma8
      - Omega_m
    systematics:
      - intrinsic alignment
      - photometric redshift uncertainty
      - shear calibration
      - baryonic feedback
      - nonlinear matter power spectrum modeling
      - lensing reconstruction bias
    arxiv_categories:
      - astro-ph.CO
      - astro-ph.GA

  dark_energy_evolution:
    description: Time-evolving dark energy equation of state and distance probes.
    applies_to_domains:
      - cosmology
    match:
      any:
        - dark energy
        - equation of state
        - expansion history
        - w0
        - wa
        - cpl
        - time evolution
      boost_if:
        - bao
        - supernova
        - desi
        - pantheon
        - planck
        - eboss
    canonical_queries:
      - '"dark energy equation of state" "w0" "wa"'
      - '"time evolving dark energy" "BAO" "supernovae"'
      - '"dark energy density evolution" "Type Ia supernovae"'
      - '"DESI" "evolving dark energy"'
      - '"Pantheon+" "dark energy equation of state"'
      - '"eBOSS" "dark energy" "w0 wa"'
      - '"Planck" "BAO" "SNe" "dark energy equation of state"'
      - '"CPL parametrization" "dark energy"'

  jwst_massive_galaxies:
    description: JWST-era high-z massive galaxy surveys and stellar populations.
    applies_to_domains:
      - galaxy_formation
    match:
      any:
        - jwst
        - james webb
        - high z
        - high-z
        - high redshift
        - early galaxies
      boost_if:
        - massive
        - stellar mass
        - ceers
        - jades
        - nirspec
        - nircam
    canonical_queries:
      - '"JWST" "massive galaxies" "high redshift"'
      - '"JWST" "stellar mass" "z > 8"'
      - '"CEERS" "massive galaxies"'
      - '"JADES" "stellar mass function"'
      - '"GLASS-JWST" "luminous galaxies" "z > 7"'
      - '"UNCOVER" "NIRSpec" "z > 8"'
      - '"red candidate massive galaxies" "600 Myr after the Big Bang"'
      - '"JWST" "quiescent galaxies" "z > 3"'
      - '"JWST" "stellar mass density" "high redshift"'

